<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Music Player</title>
<style>
:root {
  --bg: #121212;
  --surface: #1e1e1e;
  --surface2: #2a2a2a;
  --surface3: #333;
  --accent: #1DB954;
  --accent-dim: rgba(29,185,84,0.2);
  --text: #fff;
  --text2: #b3b3b3;
  --text3: #777;
  --divider: rgba(255,255,255,0.08);
  --danger: #e74c3c;
  --radius: 12px;
  --mini-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.4;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
html.has-bg-image, html.has-bg-image body {
  background: transparent;
}

button {
  font: inherit; color: inherit; background: none; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

input[type="text"], input[type="search"] {
  font: inherit; color: inherit; background: var(--surface2);
  border: none; border-radius: 8px; padding: 10px 14px;
  outline: none; width: 100%;
}
input::placeholder { color: var(--text3); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.hidden { display: none !important; }

/* ===== VIEWS ===== */
.view {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  display: flex; flex-direction: column;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.view.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }

/* ===== WELCOME VIEW ===== */
#welcome-view {
  justify-content: center; align-items: center;
  padding: 32px;
  text-align: center;
}
#welcome-view .logo-icon { margin-bottom: 24px; }
#welcome-view h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
#welcome-view p { color: var(--text2); margin-bottom: 32px; font-size: 15px; }
.welcome-buttons { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 300px; }
.btn-primary {
  background: var(--accent); color: #fff; font-weight: 600;
  padding: 14px 24px; border-radius: 50px; font-size: 16px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: opacity 0.2s;
}
.btn-primary:active { opacity: 0.7; }
.btn-secondary {
  background: var(--surface2); color: var(--text); font-weight: 600;
  padding: 14px 24px; border-radius: 50px; font-size: 16px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: opacity 0.2s;
}
.btn-secondary:active { opacity: 0.7; }

/* ===== IMPORT PROGRESS ===== */
#import-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 100;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 32px;
}
#import-overlay .progress-text { margin-bottom: 16px; font-size: 16px; }
#import-overlay .progress-bar-outer {
  width: 100%; max-width: 300px; height: 6px;
  background: var(--surface2); border-radius: 3px; overflow: hidden;
}
#import-overlay .progress-bar-inner {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.2s;
}
#import-overlay .progress-detail { margin-top: 10px; color: var(--text3); font-size: 13px; }

/* ===== LIBRARY VIEW ===== */
#library-view { display: flex; flex-direction: column; }
.lib-header {
  padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top, 0px));
  background: var(--bg);
  flex-shrink: 0;
  z-index: 10;
}
.lib-header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.lib-header h1 { font-size: 24px; font-weight: 700; }
.lib-header-actions { display: flex; gap: 8px; }
.lib-header-actions button {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: var(--surface2);
}
.lib-header-actions button:active { background: var(--surface3); }
.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--text3);
}
.search-wrap input { padding-left: 38px; }

/* Tabs */
.lib-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--divider);
  padding: 0 16px; flex-shrink: 0;
  background: var(--bg);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.lib-tabs::-webkit-scrollbar { display: none; }
.lib-tab {
  padding: 10px 0; margin-right: 24px; font-size: 14px; font-weight: 600;
  color: var(--text3); border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap; flex-shrink: 0;
}
.lib-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Track list */
.lib-content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--mini-h) + var(--safe-bottom) + 16px);
}
.track-item {
  display: flex; align-items: center; padding: 10px 16px; gap: 12px;
  transition: background 0.15s;
}
.track-item:active { background: var(--surface); }
.track-item.playing { background: var(--accent-dim); }
.track-art-sm {
  width: 48px; height: 48px; border-radius: 6px; flex-shrink: 0;
  background: var(--surface2); display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.track-art-sm img { width: 100%; height: 100%; object-fit: cover; }
.track-info { flex: 1; min-width: 0; }
.track-title {
  font-size: 15px; font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.track-artist {
  font-size: 13px; color: var(--text2); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
}
.track-duration { font-size: 13px; color: var(--text3); flex-shrink: 0; }
.track-menu-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0;
}
.track-menu-btn:active { background: var(--surface2); }

/* Group headers */
.group-header {
  padding: 16px 16px 8px; font-size: 18px; font-weight: 700;
  position: sticky; top: 0; background: var(--bg); z-index: 5;
}
.group-subheader {
  padding: 12px 16px 6px; font-size: 14px; font-weight: 600;
  color: var(--text2);
}

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 32px; color: var(--text3); text-align: center;
}
.empty-state svg { margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 15px; }

/* ===== MINI PLAYER ===== */
#mini-player {
  position: fixed; left: 0; right: 0;
  bottom: var(--safe-bottom);
  height: var(--mini-h);
  background: var(--surface); border-top: 1px solid var(--divider);
  display: flex; align-items: center; padding: 0 12px; gap: 12px;
  z-index: 50; cursor: pointer;
}
#mini-player .mini-art {
  width: 44px; height: 44px; border-radius: 6px; flex-shrink: 0;
  background: var(--surface2); display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
#mini-player .mini-art img { width: 100%; height: 100%; object-fit: cover; }
#mini-player .mini-info { flex: 1; min-width: 0; }
#mini-player .mini-title {
  font-size: 14px; font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
#mini-player .mini-artist {
  font-size: 12px; color: var(--text2); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
#mini-player .mini-controls { display: flex; gap: 4px; }
#mini-player .mini-controls button {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
}
.mini-progress {
  position: absolute; top: -2px; left: 0; right: 0; height: 3px;
  background: var(--surface2);
}
.mini-progress-bar { height: 100%; background: var(--accent); transition: width 0.3s linear; }

/* ===== NOW PLAYING VIEW ===== */
#nowplaying-view {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  padding: 0 24px;
  padding-top: env(safe-area-inset-top, 0px);
  z-index: 60;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
  pointer-events: none;
}
#nowplaying-view.visible { transform: translateY(0); pointer-events: auto; }
.np-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; flex-shrink: 0;
}
.np-header button {
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
}
.np-header .np-title-small { font-size: 13px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.np-art-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 16px 0; min-height: 0;
}
.np-art {
  width: 100%; max-width: 340px; aspect-ratio: 1; border-radius: 12px;
  background: var(--surface2); display: flex; align-items: center; justify-content: center;
  overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.np-art img { width: 100%; height: 100%; object-fit: cover; }
.np-track-info { text-align: center; padding: 16px 0 8px; flex-shrink: 0; }
.np-track-title { font-size: 20px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-track-artist { font-size: 15px; color: var(--text2); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Seek bar */
.np-seek { padding: 8px 0; flex-shrink: 0; }
.seek-bar-wrap { position: relative; height: 32px; display: flex; align-items: center; }
.seek-bar {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; border-radius: 2px;
  background: var(--surface2); outline: none;
}
.seek-bar::-webkit-slider-runnable-track {
  height: 4px; border-radius: 2px;
}
.seek-bar::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  box-shadow: 0 0 4px rgba(0,0,0,0.3);
  margin-top: -5px;
}
.seek-times { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-top: -4px; }

/* Controls */
.np-controls { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 8px 0; flex-shrink: 0; }
.np-controls .ctrl-btn {
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.np-controls .ctrl-btn:active { background: var(--surface2); }
.np-controls .ctrl-play {
  width: 64px; height: 64px; background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.np-controls .ctrl-play:active { opacity: 0.8; }
.ctrl-active svg { color: var(--accent); }

/* Secondary controls */
.np-secondary { display: flex; align-items: center; justify-content: space-between; padding: 4px 16px 16px; flex-shrink: 0; }
.np-secondary button {
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
}

/* Volume */
.np-volume { display: flex; align-items: center; gap: 10px; padding: 0 16px 16px; flex-shrink: 0; }
.np-volume svg { flex-shrink: 0; color: var(--text3); }
.vol-bar {
  -webkit-appearance: none; appearance: none;
  flex: 1; height: 4px; border-radius: 2px;
  background: var(--surface2); outline: none;
}
.vol-bar::-webkit-slider-runnable-track {
  height: 4px; border-radius: 2px;
}
.vol-bar::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--text); cursor: pointer;
  margin-top: -4px;
}

/* ===== QUEUE PANEL ===== */
#queue-panel {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 70; display: flex; flex-direction: column;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
}
#queue-panel.visible { transform: translateY(0); }
.queue-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top, 0px));
  border-bottom: 1px solid var(--divider); flex-shrink: 0;
}
.queue-header h2 { font-size: 18px; font-weight: 700; }
.queue-header button { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
.queue-list {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: var(--safe-bottom);
}
.queue-item {
  display: flex; align-items: center; padding: 10px 16px; gap: 12px;
}
.queue-item.current { background: var(--accent-dim); }
.queue-item .q-drag {
  width: 32px; height: 44px; display: flex; align-items: center; justify-content: center;
  color: var(--text3); cursor: grab; flex-shrink: 0;
}
.queue-item .q-info { flex: 1; min-width: 0; }
.queue-item .q-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-item .q-artist { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-item .q-remove {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0; color: var(--text3);
}
.queue-item .q-remove:active { background: var(--surface2); color: var(--danger); }

/* ===== CONTEXT MENU ===== */
#context-menu {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
  background: var(--surface); border-radius: 16px 16px 0 0;
  padding: 8px 0; padding-bottom: calc(8px + var(--safe-bottom));
  transform: translateY(100%); transition: transform 0.3s ease;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
}
#context-menu.visible { transform: translateY(0); }
#context-menu-backdrop {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 79;
}
.ctx-header { padding: 12px 20px; border-bottom: 1px solid var(--divider); }
.ctx-header .ctx-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ctx-header .ctx-subtitle { font-size: 13px; color: var(--text2); }
.ctx-item {
  display: flex; align-items: center; gap: 16px; padding: 14px 20px;
  font-size: 15px;
}
.ctx-item:active { background: var(--surface2); }
.ctx-item svg { flex-shrink: 0; color: var(--text2); }
.ctx-item.danger { color: var(--danger); }
.ctx-item.danger svg { color: var(--danger); }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: calc(var(--mini-h) + var(--safe-bottom) + 16px);
  left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface2); color: var(--text); padding: 12px 20px;
  border-radius: 8px; font-size: 14px; z-index: 90;
  opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease;
  pointer-events: none; white-space: nowrap;
}
#toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== BACKGROUND LAYER ===== */
#bg-layer {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 0; pointer-events: none;
  background-size: cover; background-position: center; background-repeat: no-repeat;
}
#bg-layer.has-image::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg); opacity: 0.75;
}
/* When bg image is active, make body and main surfaces transparent so image shows through */
#bg-layer.has-image ~ #welcome-view,
#bg-layer.has-image ~ #library-view {
  background: transparent;
}
#bg-layer.has-image ~ #library-view .lib-header,
#bg-layer.has-image ~ #library-view .lib-tabs,
#bg-layer.has-image ~ #library-view .lib-content .group-header,
#bg-layer.has-image ~ #library-view .lib-content .pl-detail-header {
  background: var(--bg-translucent, var(--bg));
}
#bg-layer.has-image ~ #mini-player {
  background: var(--bg-translucent, var(--surface));
}
#bg-layer.has-image ~ #nowplaying-view {
  background: var(--bg-translucent, var(--bg));
}
#bg-layer.has-image ~ #queue-panel {
  background: var(--bg-translucent, var(--bg));
}
#bg-layer.has-image ~ #settings-panel {
  background: var(--bg-translucent, var(--bg));
}
#bg-layer.has-image ~ #context-menu {
  background: var(--bg-translucent, var(--surface));
}

/* ===== SETTINGS PANEL ===== */
#settings-panel {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 75; display: flex; flex-direction: column;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
}
#settings-panel.visible { transform: translateY(0); }
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top, 0px));
  border-bottom: 1px solid var(--divider); flex-shrink: 0;
}
.settings-header h2 { font-size: 18px; font-weight: 700; }
.settings-header button { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
.settings-content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px; padding-bottom: calc(16px + var(--safe-bottom));
}
.settings-section { margin-bottom: 28px; }
.settings-section h3 {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text3); margin-bottom: 14px;
}

/* Theme swatches */
.theme-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
}
.theme-swatch {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 14px 8px; border-radius: 12px; border: 2px solid var(--surface2);
  background: var(--surface); transition: border-color 0.2s;
  cursor: pointer;
}
.theme-swatch:active { opacity: 0.7; }
.theme-swatch.active { border-color: var(--accent); }
.swatch-preview {
  width: 40px; height: 40px; border-radius: 10px; position: relative;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.swatch-preview .swatch-dot {
  width: 14px; height: 14px; border-radius: 50%;
}
.swatch-name { font-size: 11px; font-weight: 600; color: var(--text2); }
.theme-swatch.active .swatch-name { color: var(--accent); }

/* Background image input */
.bg-input-row { display: flex; gap: 10px; margin-bottom: 12px; }
.bg-input-row input {
  flex: 1; width: auto; min-width: 0; font-size: 14px; padding: 10px 14px;
  background: var(--surface2); border: none; border-radius: 8px;
  color: var(--text); outline: none;
}
.bg-input-row input::placeholder { color: var(--text3); }
.bg-input-row button {
  padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600;
  white-space: nowrap;
}
.bg-apply-btn { background: var(--accent); color: #fff; }
.bg-apply-btn:active { opacity: 0.7; }
.bg-preview-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.bg-preview-thumb {
  width: 64px; height: 64px; border-radius: 8px; object-fit: cover;
  background: var(--surface2); flex-shrink: 0;
}
.bg-clear-btn {
  padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  background: var(--surface2); color: var(--danger);
}
.bg-clear-btn:active { opacity: 0.7; }
.bg-help { font-size: 12px; color: var(--text3); line-height: 1.5; }
.bg-no-image { font-size: 13px; color: var(--text3); }

/* ===== PLAYLIST ITEMS ===== */
.create-playlist-btn {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  color: var(--accent); font-weight: 600; font-size: 15px;
  border-bottom: 1px solid var(--divider);
}
.create-playlist-btn:active { background: var(--surface); }
.create-playlist-btn svg { flex-shrink: 0; }
.playlist-item {
  display: flex; align-items: center; padding: 12px 16px; gap: 12px;
  transition: background 0.15s;
}
.playlist-item:active { background: var(--surface); }
.playlist-icon {
  width: 48px; height: 48px; border-radius: 8px; flex-shrink: 0;
  background: var(--surface2); display: flex; align-items: center; justify-content: center;
}
.playlist-info { flex: 1; min-width: 0; }
.playlist-name {
  font-size: 15px; font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.playlist-count { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* Playlist detail header */
.pl-detail-header {
  display: flex; align-items: center; gap: 12px; padding: 16px;
  border-bottom: 1px solid var(--divider);
  position: sticky; top: 0; background: var(--bg); z-index: 5;
}
.pl-detail-header .pl-back {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0;
}
.pl-detail-header .pl-back:active { background: var(--surface2); }
.pl-detail-name { flex: 1; font-size: 18px; font-weight: 700; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pl-detail-actions { display: flex; gap: 8px; }
.pl-detail-actions button {
  padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.pl-play-btn { background: var(--accent); color: var(--play-btn-fg, #fff); }
.pl-play-btn:active { opacity: 0.7; }
.pl-shuffle-btn { background: var(--surface2); color: var(--text); }
.pl-shuffle-btn:active { opacity: 0.7; }

/* ===== PROMPT DIALOG ===== */
#prompt-backdrop {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 95;
}
#prompt-dialog {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: calc(100% - 48px); max-width: 320px;
  background: var(--surface); border-radius: 16px; padding: 24px;
  z-index: 96; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.prompt-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
#prompt-input {
  width: 100%; padding: 12px 14px; font-size: 15px;
  background: var(--surface2); border: 1px solid var(--divider);
  border-radius: 8px; color: var(--text); outline: none; margin-bottom: 20px;
}
#prompt-input:focus { border-color: var(--accent); }
.prompt-buttons { display: flex; justify-content: flex-end; gap: 12px; }
.prompt-cancel {
  padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
  background: var(--surface2); color: var(--text);
}
.prompt-confirm {
  padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
  background: var(--accent); color: var(--play-btn-fg, #fff);
}
.prompt-cancel:active, .prompt-confirm:active { opacity: 0.7; }

/* ===== YOUTUBE ===== */
.np-yt-container {
  width: 100%; max-width: 340px; aspect-ratio: 16/9; border-radius: 12px;
  overflow: hidden; background: #000;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.np-yt-container iframe { width: 100%; height: 100%; border: 0; }
.np-yt-container.yt-offscreen {
  position: fixed; top: -9999px; left: -9999px;
  width: 1px; height: 1px; overflow: hidden;
  opacity: 0; pointer-events: none;
}
.yt-badge {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(255,0,0,0.85); color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
}
.track-art-sm { position: relative; }
.track-art-sm .yt-badge-sm {
  position: absolute; bottom: 2px; right: 2px;
  background: rgba(255,0,0,0.85); color: #fff; font-size: 8px; font-weight: 700;
  padding: 1px 4px; border-radius: 3px;
}

/* ===== UTILITIES ===== */
.icon { display: inline-flex; }
@media (max-height: 600px) {
  .np-art-wrap { padding: 8px 0; }
  .np-art { max-width: 200px; }
}
</style>
</head>

<script>
// ============================================================
// SECTION 1: METADATA PARSER
// ============================================================
const MetadataParser = (() => {

  function readFileSliceAsBuffer(file, start, end) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsArrayBuffer(file.slice(start, end));
    });
  }

  function decodeString(buffer, offset, length, encoding) {
    const bytes = new Uint8Array(buffer, offset, length);
    if (encoding === 0) return new TextDecoder('iso-8859-1').decode(bytes);
    if (encoding === 1) {
      if (bytes[0] === 0xFF && bytes[1] === 0xFE) return new TextDecoder('utf-16le').decode(bytes.slice(2));
      if (bytes[0] === 0xFE && bytes[1] === 0xFF) return new TextDecoder('utf-16be').decode(bytes.slice(2));
      return new TextDecoder('utf-16le').decode(bytes);
    }
    if (encoding === 2) return new TextDecoder('utf-16be').decode(bytes);
    return new TextDecoder('utf-8').decode(bytes);
  }

  function trimNull(s) { return s.replace(/\0+$/, '').trim(); }

  // === ID3v2 Parser ===
  async function parseID3v2(file) {
    const headerSize = Math.min(file.size, 524288);
    const buf = await readFileSliceAsBuffer(file, 0, headerSize);
    const dv = new DataView(buf);
    const u8 = new Uint8Array(buf);

    if (dv.getUint8(0) !== 0x49 || dv.getUint8(1) !== 0x44 || dv.getUint8(2) !== 0x33) return null;

    const version = dv.getUint8(3);
    const flags = dv.getUint8(5);
    const size = (dv.getUint8(6) << 21) | (dv.getUint8(7) << 14) | (dv.getUint8(8) << 7) | dv.getUint8(9);

    let offset = 10;
    if (flags & 0x40) { // extended header
      const extSize = dv.getUint32(offset);
      offset += extSize;
    }

    const result = { title: '', artist: '', album: '', year: '', art: null, artMime: '' };
    const end = Math.min(10 + size, buf.byteLength);

    while (offset + 10 < end) {
      const frameId = String.fromCharCode(u8[offset], u8[offset+1], u8[offset+2], u8[offset+3]);
      if (frameId[0] === '\0') break;

      let frameSize;
      if (version === 4) {
        frameSize = (u8[offset+4] << 21) | (u8[offset+5] << 14) | (u8[offset+6] << 7) | u8[offset+7];
      } else {
        frameSize = (u8[offset+4] << 24) | (u8[offset+5] << 16) | (u8[offset+6] << 8) | u8[offset+7];
      }

      if (frameSize <= 0 || offset + 10 + frameSize > end) break;
      const dataOffset = offset + 10;

      if (['TIT2','TPE1','TALB','TDRC','TYER'].includes(frameId)) {
        const enc = u8[dataOffset];
        let str = '';
        try { str = decodeString(buf, dataOffset + 1, frameSize - 1, enc); } catch(e) {}
        str = trimNull(str);
        if (frameId === 'TIT2') result.title = str;
        else if (frameId === 'TPE1') result.artist = str;
        else if (frameId === 'TALB') result.album = str;
        else if (frameId === 'TDRC' || frameId === 'TYER') result.year = str;
      }
      else if (frameId === 'APIC' && !result.art) {
        try {
          const enc = u8[dataOffset];
          let pos = dataOffset + 1;
          let mime = '';
          while (pos < dataOffset + frameSize && u8[pos] !== 0) { mime += String.fromCharCode(u8[pos]); pos++; }
          pos++; // null terminator
          pos++; // picture type
          // skip description
          if (enc === 0 || enc === 3) { while (pos < dataOffset + frameSize && u8[pos] !== 0) pos++; pos++; }
          else { while (pos + 1 < dataOffset + frameSize) { if (u8[pos] === 0 && u8[pos+1] === 0) { pos += 2; break; } pos += 2; } }
          if (pos < dataOffset + frameSize) {
            result.art = new Uint8Array(buf, pos, dataOffset + frameSize - pos);
            result.artMime = mime || 'image/jpeg';
          }
        } catch(e) {}
      }

      offset += 10 + frameSize;
    }

    return (result.title || result.artist || result.album || result.art) ? result : null;
  }

  // === ID3v1 Parser ===
  async function parseID3v1(file) {
    if (file.size < 128) return null;
    const buf = await readFileSliceAsBuffer(file, file.size - 128, file.size);
    const u8 = new Uint8Array(buf);
    if (u8[0] !== 0x54 || u8[1] !== 0x41 || u8[2] !== 0x47) return null;

    const dec = new TextDecoder('iso-8859-1');
    return {
      title: trimNull(dec.decode(u8.slice(3, 33))),
      artist: trimNull(dec.decode(u8.slice(33, 63))),
      album: trimNull(dec.decode(u8.slice(63, 93))),
      year: trimNull(dec.decode(u8.slice(93, 97))),
      art: null, artMime: ''
    };
  }

  // === MP4/M4A Parser ===
  async function parseMP4(file) {
    const size = Math.min(file.size, 2 * 1024 * 1024);
    const buf = await readFileSliceAsBuffer(file, 0, size);
    const dv = new DataView(buf);
    const u8 = new Uint8Array(buf);
    const result = { title: '', artist: '', album: '', year: '', art: null, artMime: '' };

    function findAtom(start, end, name) {
      let pos = start;
      while (pos + 8 <= end) {
        let aSize = dv.getUint32(pos);
        const aName = String.fromCharCode(u8[pos+4], u8[pos+5], u8[pos+6], u8[pos+7]);
        if (aSize === 0) aSize = end - pos;
        if (aSize < 8 || pos + aSize > end) break;
        if (aName === name) return { offset: pos, size: aSize };
        pos += aSize;
      }
      return null;
    }

    function readDataAtom(offset, size) {
      const inner = offset + 8;
      if (inner + 16 > offset + size) return '';
      const dataSize = dv.getUint32(inner);
      const dataName = String.fromCharCode(u8[inner+4], u8[inner+5], u8[inner+6], u8[inner+7]);
      if (dataName !== 'data' || inner + 16 > offset + size) return '';
      return new TextDecoder('utf-8').decode(u8.slice(inner + 16, inner + dataSize));
    }

    try {
      const moov = findAtom(0, buf.byteLength, 'moov');
      if (!moov) return null;
      const udta = findAtom(moov.offset + 8, moov.offset + moov.size, 'udta');
      if (!udta) return null;
      const meta = findAtom(udta.offset + 8, udta.offset + udta.size, 'meta');
      if (!meta) return null;

      // meta has 4-byte version/flags after the header
      const ilst = findAtom(meta.offset + 12, meta.offset + meta.size, 'ilst');
      if (!ilst) return null;

      let pos = ilst.offset + 8;
      const ilstEnd = ilst.offset + ilst.size;
      while (pos + 8 <= ilstEnd) {
        let aSize = dv.getUint32(pos);
        const aName = String.fromCharCode(u8[pos+4], u8[pos+5], u8[pos+6], u8[pos+7]);
        if (aSize < 8 || pos + aSize > ilstEnd) break;

        if (aName === '\xA9nam') result.title = trimNull(readDataAtom(pos, aSize));
        else if (aName === '\xA9ART') result.artist = trimNull(readDataAtom(pos, aSize));
        else if (aName === '\xA9alb') result.album = trimNull(readDataAtom(pos, aSize));
        else if (aName === '\xA9day') result.year = trimNull(readDataAtom(pos, aSize));
        else if (aName === 'covr' && !result.art) {
          const inner = pos + 8;
          if (inner + 16 <= pos + aSize) {
            const dataSize = dv.getUint32(inner);
            const dataType = dv.getUint32(inner + 8);
            result.art = new Uint8Array(buf.slice(inner + 16, inner + dataSize));
            result.artMime = dataType === 14 ? 'image/png' : 'image/jpeg';
          }
        }
        pos += aSize;
      }
    } catch(e) {}

    return (result.title || result.artist || result.album || result.art) ? result : null;
  }

  // === FLAC Parser ===
  async function parseFLAC(file) {
    const size = Math.min(file.size, 1024 * 1024);
    const buf = await readFileSliceAsBuffer(file, 0, size);
    const dv = new DataView(buf);
    const u8 = new Uint8Array(buf);

    if (u8[0] !== 0x66 || u8[1] !== 0x4C || u8[2] !== 0x61 || u8[3] !== 0x43) return null;

    const result = { title: '', artist: '', album: '', year: '', art: null, artMime: '' };
    let pos = 4;

    while (pos + 4 <= buf.byteLength) {
      const blockHeader = dv.getUint8(pos);
      const isLast = (blockHeader & 0x80) !== 0;
      const blockType = blockHeader & 0x7F;
      const blockSize = (u8[pos+1] << 16) | (u8[pos+2] << 8) | u8[pos+3];
      pos += 4;

      if (pos + blockSize > buf.byteLength) break;

      if (blockType === 4) { // VORBIS_COMMENT
        let off = pos;
        const vendorLen = dv.getUint32(off, true); off += 4 + vendorLen;
        const numComments = dv.getUint32(off, true); off += 4;
        for (let i = 0; i < numComments && off + 4 <= pos + blockSize; i++) {
          const commentLen = dv.getUint32(off, true); off += 4;
          if (off + commentLen > pos + blockSize) break;
          const comment = new TextDecoder('utf-8').decode(u8.slice(off, off + commentLen));
          off += commentLen;
          const eq = comment.indexOf('=');
          if (eq === -1) continue;
          const key = comment.substring(0, eq).toUpperCase();
          const val = comment.substring(eq + 1);
          if (key === 'TITLE') result.title = val;
          else if (key === 'ARTIST') result.artist = val;
          else if (key === 'ALBUM') result.album = val;
          else if (key === 'DATE') result.year = val;
        }
      }
      else if (blockType === 6 && !result.art) { // PICTURE
        let off = pos;
        off += 4; // picture type
        const mimeLen = dv.getUint32(off); off += 4;
        const mime = new TextDecoder('ascii').decode(u8.slice(off, off + mimeLen)); off += mimeLen;
        const descLen = dv.getUint32(off); off += 4 + descLen;
        off += 16; // width, height, depth, colors
        const picLen = dv.getUint32(off); off += 4;
        if (off + picLen <= pos + blockSize) {
          result.art = new Uint8Array(buf.slice(off, off + picLen));
          result.artMime = mime;
        }
      }

      pos += blockSize;
      if (isLast) break;
    }

    return (result.title || result.artist || result.album || result.art) ? result : null;
  }

  // === OGG Vorbis Parser ===
  async function parseOGG(file) {
    const size = Math.min(file.size, 524288);
    const buf = await readFileSliceAsBuffer(file, 0, size);
    const u8 = new Uint8Array(buf);

    if (u8[0] !== 0x4F || u8[1] !== 0x67 || u8[2] !== 0x67 || u8[3] !== 0x53) return null;

    // Find vorbis comment header (packet type 3)
    const result = { title: '', artist: '', album: '', year: '', art: null, artMime: '' };
    let pos = 0;

    // Skip through OGG pages to find the comment header
    for (let page = 0; page < 10 && pos < buf.byteLength - 27; page++) {
      if (u8[pos] !== 0x4F || u8[pos+1] !== 0x67 || u8[pos+2] !== 0x67 || u8[pos+3] !== 0x53) break;
      const numSegments = u8[pos + 26];
      let dataSize = 0;
      for (let s = 0; s < numSegments; s++) dataSize += u8[pos + 27 + s];
      const dataStart = pos + 27 + numSegments;

      // Check for vorbis comment header (0x03 + "vorbis")
      if (dataStart + 7 < buf.byteLength && u8[dataStart] === 0x03 &&
          u8[dataStart+1] === 0x76 && u8[dataStart+2] === 0x6F) {
        const dv2 = new DataView(buf);
        let off = dataStart + 7;
        const vendorLen = dv2.getUint32(off, true); off += 4 + vendorLen;
        if (off + 4 > dataStart + dataSize) break;
        const numComments = dv2.getUint32(off, true); off += 4;
        for (let i = 0; i < numComments && off + 4 < buf.byteLength; i++) {
          const commentLen = dv2.getUint32(off, true); off += 4;
          if (off + commentLen > buf.byteLength) break;
          const comment = new TextDecoder('utf-8').decode(u8.slice(off, off + commentLen));
          off += commentLen;
          const eq = comment.indexOf('=');
          if (eq === -1) continue;
          const key = comment.substring(0, eq).toUpperCase();
          const val = comment.substring(eq + 1);
          if (key === 'TITLE') result.title = val;
          else if (key === 'ARTIST') result.artist = val;
          else if (key === 'ALBUM') result.album = val;
          else if (key === 'DATE') result.year = val;
        }
        break;
      }
      pos = dataStart + dataSize;
    }

    return (result.title || result.artist || result.album) ? result : null;
  }

  // === Duration via Audio Element ===
  function getDuration(file) {
    return new Promise(resolve => {
      let resolved = false;
      const audio = document.createElement('audio');
      const url = URL.createObjectURL(file);
      audio.preload = 'metadata';
      const done = (val) => { if (resolved) return; resolved = true; URL.revokeObjectURL(url); audio.src = ''; resolve(val); };
      audio.onloadedmetadata = () => done(audio.duration || 0);
      audio.onerror = () => done(0);
      audio.src = url;
      setTimeout(() => done(0), 5000);
    });
  }

  // === Main parse function ===
  async function parse(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    let meta = null;

    try {
      if (ext === 'mp3') {
        meta = await parseID3v2(file);
        if (!meta) meta = await parseID3v1(file);
      } else if (['m4a', 'aac', 'mp4'].includes(ext)) {
        meta = await parseMP4(file);
      } else if (ext === 'flac') {
        meta = await parseFLAC(file);
      } else if (ext === 'ogg' || ext === 'oga') {
        meta = await parseOGG(file);
      }
    } catch(e) { /* fallback below */ }

    if (!meta) meta = { title: '', artist: '', album: '', year: '', art: null, artMime: '' };

    if (!meta.title) {
      meta.title = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ').trim();
    }
    if (!meta.artist) meta.artist = 'Unknown Artist';
    if (!meta.album) meta.album = 'Unknown Album';

    meta.duration = await getDuration(file);
    meta.fileName = file.name;
    meta.fileSize = file.size;

    return meta;
  }

  return { parse };
})();

// SECTION 2: DATABASE LAYER (IndexedDB)
// ============================================================
const DB = (() => {
  const DB_NAME = 'MusicPlayerDB';
  const DB_VERSION = 3;
  let db = null;

  function open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('tracks')) {
          const store = d.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true });
          store.createIndex('title', 'title');
          store.createIndex('artist', 'artist');
          store.createIndex('album', 'album');
        }
        if (!d.objectStoreNames.contains('trackFiles')) {
          d.createObjectStore('trackFiles', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('trackArt')) {
          d.createObjectStore('trackArt', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('preferences')) {
          d.createObjectStore('preferences', { keyPath: 'key' });
        }
        if (!d.objectStoreNames.contains('playbackState')) {
          d.createObjectStore('playbackState', { keyPath: 'key' });
        }
        if (!d.objectStoreNames.contains('playlists')) {
          d.createObjectStore('playlists', { keyPath: 'id', autoIncrement: true });
        }
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(db); };
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function tx(stores, mode) {
    const t = db.transaction(stores, mode);
    return stores.length === 1 ? t.objectStore(stores[0]) : stores.map(s => t.objectStore(s));
  }

  function req(r) {
    return new Promise((resolve, reject) => { r.onsuccess = () => resolve(r.result); r.onerror = () => reject(r.error); });
  }

  async function addTrack(meta, fileBlob, artBlob, artMime) {
    const t = db.transaction(['tracks', 'trackFiles', 'trackArt'], 'readwrite');
    const trackStore = t.objectStore('tracks');
    const fileStore = t.objectStore('trackFiles');
    const artStore = t.objectStore('trackArt');

    const trackData = {
      title: meta.title, artist: meta.artist, album: meta.album,
      year: meta.year || '', duration: meta.duration,
      fileName: meta.fileName, fileSize: meta.fileSize,
      hasArt: !!artBlob
    };

    return new Promise((resolve, reject) => {
      const addReq = trackStore.add(trackData);
      addReq.onsuccess = () => {
        const id = addReq.result;
        fileStore.put({ id, blob: fileBlob });
        if (artBlob) artStore.put({ id, blob: artBlob, mime: artMime });
        t.oncomplete = () => resolve(id);
      };
      t.onerror = () => reject(t.error);
    });
  }

  async function getAllTracks() { return req(tx(['tracks'], 'readonly').getAll()); }
  async function getTrackBlob(id) { const r = await req(tx(['trackFiles'], 'readonly').get(id)); return r ? r.blob : null; }
  async function getTrackArt(id) { const r = await req(tx(['trackArt'], 'readonly').get(id)); return r || null; }

  async function removeTrack(id) {
    const t = db.transaction(['tracks', 'trackFiles', 'trackArt'], 'readwrite');
    t.objectStore('tracks').delete(id);
    t.objectStore('trackFiles').delete(id);
    t.objectStore('trackArt').delete(id);
    return new Promise(r => { t.oncomplete = r; });
  }

  async function clearAll() {
    const t = db.transaction(['tracks', 'trackFiles', 'trackArt', 'playbackState', 'playlists'], 'readwrite');
    t.objectStore('tracks').clear();
    t.objectStore('trackFiles').clear();
    t.objectStore('trackArt').clear();
    t.objectStore('playbackState').clear();
    t.objectStore('playlists').clear();
    return new Promise(r => { t.oncomplete = r; });
  }

  async function savePref(key, value) { return req(tx(['preferences'], 'readwrite').put({ key, value })); }
  async function getPref(key) { const r = await req(tx(['preferences'], 'readonly').get(key)); return r ? r.value : null; }

  async function saveState(key, value) { return req(tx(['playbackState'], 'readwrite').put({ key, value })); }
  async function getState(key) { const r = await req(tx(['playbackState'], 'readonly').get(key)); return r ? r.value : null; }

  // Playlist CRUD
  async function getAllPlaylists() { return req(tx(['playlists'], 'readonly').getAll()); }
  async function addPlaylist(pl) { return req(tx(['playlists'], 'readwrite').add(pl)); }
  async function updatePlaylist(pl) { return req(tx(['playlists'], 'readwrite').put(pl)); }
  async function removePlaylist(id) { return req(tx(['playlists'], 'readwrite').delete(id)); }

  // Add metadata-only track (no blob) — used for YouTube tracks
  async function addTrackMeta(data) { return req(tx(['tracks'], 'readwrite').add(data)); }
  async function updateTrackMeta(data) { return req(tx(['tracks'], 'readwrite').put(data)); }

  return { open, addTrack, addTrackMeta, updateTrackMeta, getAllTracks, getTrackBlob, getTrackArt, removeTrack, clearAll, savePref, getPref, saveState, getState, getAllPlaylists, addPlaylist, updatePlaylist, removePlaylist };
})();


// ============================================================
// SECTION 3: LIBRARY MANAGER
// ============================================================
const Library = (() => {
  let tracks = [];
  let onUpdate = null;

  const AUDIO_EXTS = ['mp3','m4a','aac','mp4','flac','ogg','oga','wav','webm','opus'];

  function isAudio(fileName) {
    const ext = fileName.split('.').pop().toLowerCase();
    return AUDIO_EXTS.includes(ext);
  }

  function isDuplicate(fileName, fileSize) {
    return tracks.some(t => t.fileName === fileName && t.fileSize === fileSize);
  }

  async function loadFromDB() {
    tracks = await DB.getAllTracks();
    tracks.sort((a, b) => a.title.localeCompare(b.title));
  }

  async function importFiles(files, onProgress) {
    const audioFiles = Array.from(files).filter(f => isAudio(f.name));
    let added = 0, skipped = 0;

    for (let i = 0; i < audioFiles.length; i++) {
      const f = audioFiles[i];
      if (onProgress) onProgress(i + 1, audioFiles.length, f.name);

      if (isDuplicate(f.name, f.size)) { skipped++; continue; }

      try {
        const meta = await MetadataParser.parse(f);
        let artBlob = null, artMime = '';
        if (meta.art) {
          // Resize art to max 300x300
          try {
            const origBlob = new Blob([meta.art], { type: meta.artMime });
            artBlob = await resizeArt(origBlob, 300);
            artMime = 'image/jpeg';
          } catch(e) {
            artBlob = new Blob([meta.art], { type: meta.artMime });
            artMime = meta.artMime;
          }
        }
        const id = await DB.addTrack(meta, f, artBlob, artMime);
        tracks.push({
          id, title: meta.title, artist: meta.artist, album: meta.album,
          year: meta.year, duration: meta.duration,
          fileName: meta.fileName, fileSize: meta.fileSize,
          hasArt: !!artBlob
        });
        added++;
      } catch(e) { console.warn('Failed to import', f.name, e); }
    }

    tracks.sort((a, b) => a.title.localeCompare(b.title));
    if (onUpdate) onUpdate();
    return { added, skipped, total: audioFiles.length };
  }

  function resizeArt(blob, maxSize) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let w = img.width, h = img.height;
        if (w <= maxSize && h <= maxSize) { resolve(blob); return; }
        const scale = maxSize / Math.max(w, h);
        w = Math.round(w * scale); h = Math.round(h * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/jpeg', 0.85);
      };
      img.onerror = reject;
      img.src = url;
    });
  }

  function getAll() { return tracks; }

  function search(query) {
    if (!query) return tracks;
    const q = query.toLowerCase();
    return tracks.filter(t =>
      t.title.toLowerCase().includes(q) ||
      t.artist.toLowerCase().includes(q) ||
      t.album.toLowerCase().includes(q)
    );
  }

  function getByArtist() {
    const map = {};
    tracks.forEach(t => {
      if (!map[t.artist]) map[t.artist] = [];
      map[t.artist].push(t);
    });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
  }

  function getByAlbum() {
    const map = {};
    tracks.forEach(t => {
      const key = t.album + '|||' + t.artist;
      if (!map[key]) map[key] = { album: t.album, artist: t.artist, tracks: [] };
      map[key].tracks.push(t);
    });
    return Object.values(map).sort((a, b) => a.album.localeCompare(b.album));
  }

  async function removeTrack(id) {
    await DB.removeTrack(id);
    tracks = tracks.filter(t => t.id !== id);
    if (onUpdate) onUpdate();
  }

  async function clearLibrary() {
    await DB.clearAll();
    tracks = [];
    if (onUpdate) onUpdate();
  }

  function isYouTubeDuplicate(videoId) {
    return tracks.some(t => t.source === 'youtube' && t.videoId === videoId);
  }

  function addToMemory(track) {
    tracks.push(track);
    tracks.sort((a, b) => a.title.localeCompare(b.title));
    if (onUpdate) onUpdate();
  }

  function updateTrackInMemory(id, updates) {
    const t = tracks.find(tr => tr.id === id);
    if (t) Object.assign(t, updates);
  }

  function setOnUpdate(fn) { onUpdate = fn; }

  return { loadFromDB, importFiles, getAll, search, getByArtist, getByAlbum, removeTrack, clearLibrary, isYouTubeDuplicate, addToMemory, updateTrackInMemory, setOnUpdate };
})();

// SECTION 3b: PLAYLIST MANAGER
// ============================================================
const Playlist = (() => {
  let playlists = [];
  let onUpdate = null;

  async function loadFromDB() {
    playlists = await DB.getAllPlaylists();
    playlists.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
  }

  function getAll() { return playlists; }

  function getById(id) { return playlists.find(p => p.id === id) || null; }

  async function create(name) {
    const pl = { name, trackIds: [], createdAt: Date.now() };
    pl.id = await DB.addPlaylist(pl);
    playlists.push(pl);
    if (onUpdate) onUpdate();
    return pl;
  }

  async function rename(id, newName) {
    const pl = getById(id);
    if (!pl) return;
    pl.name = newName;
    await DB.updatePlaylist(pl);
    if (onUpdate) onUpdate();
  }

  async function remove(id) {
    await DB.removePlaylist(id);
    playlists = playlists.filter(p => p.id !== id);
    if (onUpdate) onUpdate();
  }

  async function addTrack(playlistId, trackId) {
    const pl = getById(playlistId);
    if (!pl) return false;
    if (pl.trackIds.includes(trackId)) return false;
    pl.trackIds.push(trackId);
    await DB.updatePlaylist(pl);
    if (onUpdate) onUpdate();
    return true;
  }

  async function removeTrack(playlistId, trackId) {
    const pl = getById(playlistId);
    if (!pl) return;
    pl.trackIds = pl.trackIds.filter(id => id !== trackId);
    await DB.updatePlaylist(pl);
    if (onUpdate) onUpdate();
  }

  async function removeTrackFromAll(trackId) {
    for (const pl of playlists) {
      if (pl.trackIds.includes(trackId)) {
        pl.trackIds = pl.trackIds.filter(id => id !== trackId);
        await DB.updatePlaylist(pl);
      }
    }
  }

  function getTracksForPlaylist(id) {
    const pl = getById(id);
    if (!pl) return [];
    const allTracks = Library.getAll();
    return pl.trackIds.map(tid => allTracks.find(t => t.id === tid)).filter(Boolean);
  }

  function clearAll() { playlists = []; }

  function setOnUpdate(fn) { onUpdate = fn; }

  return { loadFromDB, getAll, getById, create, rename, remove, addTrack, removeTrack, removeTrackFromAll, getTracksForPlaylist, clearAll, setOnUpdate };
})();

  function current() { return playOrder[currentIndex] ?? null; }

  function next() {
    if (playOrder.length === 0) return null;
    if (repeatMode === 'one') return playOrder[currentIndex];
    currentIndex++;
    if (currentIndex >= playOrder.length) {
      if (repeatMode === 'all') { currentIndex = 0; if (shuffleOn) reshuffle(); }
      else { currentIndex = playOrder.length - 1; return null; }
    }
    saveQueue();
    return playOrder[currentIndex];
  }

  function prev() {
    if (playOrder.length === 0) return null;
    if (repeatMode === 'one') return playOrder[currentIndex];
    currentIndex--;
    if (currentIndex < 0) {
      if (repeatMode === 'all') currentIndex = playOrder.length - 1;
      else { currentIndex = 0; return playOrder[0]; }
    }
    saveQueue();
    return playOrder[currentIndex];
  }

  function toggleShuffle() {
    shuffleOn = !shuffleOn;
    const curId = playOrder[currentIndex];
    if (shuffleOn) {
      playOrder = shuffleArray([...originalOrder]);
      if (curId != null) {
        const idx = playOrder.indexOf(curId);
        if (idx > 0) { playOrder.splice(idx, 1); playOrder.unshift(curId); }
      }
      currentIndex = 0;
    } else {
      playOrder = [...originalOrder];
      currentIndex = curId != null ? playOrder.indexOf(curId) : 0;
    }
    saveQueue();
    return shuffleOn;
  }

  function cycleRepeat() {
    if (repeatMode === 'off') repeatMode = 'all';
    else if (repeatMode === 'all') repeatMode = 'one';
    else repeatMode = 'off';
    saveQueue();
    return repeatMode;
  }

  function getState() { return { shuffleOn, repeatMode }; }

  function addToQueue(trackId) {
    originalOrder.push(trackId);
    playOrder.push(trackId);
    saveQueue();
  }

  function insertAfterCurrent(trackId) {
    const insertAt = currentIndex + 1;
    playOrder.splice(insertAt, 0, trackId);
    originalOrder.splice(insertAt, 0, trackId);
    saveQueue();
  }

  function removeFromQueue(index) {
    if (index < 0 || index >= playOrder.length) return;
    const id = playOrder[index];
    playOrder.splice(index, 1);
    const origIdx = originalOrder.indexOf(id);
    if (origIdx !== -1) originalOrder.splice(origIdx, 1);
    if (index < currentIndex) currentIndex--;
    else if (index === currentIndex && currentIndex >= playOrder.length) currentIndex = playOrder.length - 1;
    saveQueue();
  }

  function jumpTo(index) {
    if (index >= 0 && index < playOrder.length) {
      currentIndex = index;
      saveQueue();
      return playOrder[currentIndex];
    }
    return null;
  }

  function getPlayOrder() { return playOrder; }
  function getCurrentIndex() { return currentIndex; }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function reshuffle() {
    const curId = playOrder[currentIndex];
    playOrder = shuffleArray([...originalOrder]);
    if (curId != null) {
      const idx = playOrder.indexOf(curId);
      if (idx > 0) { playOrder.splice(idx, 1); playOrder.unshift(curId); }
    }
    currentIndex = 0;
  }

  async function saveQueue() {
    try {
      await DB.saveState('queue', { originalOrder, playOrder, currentIndex, shuffleOn, repeatMode });
    } catch(e) {}
  }

  async function restoreQueue() {
    try {
      const s = await DB.getState('queue');
      if (s) {
        originalOrder = s.originalOrder || [];
        playOrder = s.playOrder || [];
        currentIndex = s.currentIndex ?? -1;
        shuffleOn = s.shuffleOn ?? false;
        repeatMode = s.repeatMode ?? 'off';
      }
    } catch(e) {}
  }

  return { setQueue, current, next, prev, jumpTo, toggleShuffle, cycleRepeat, getState, addToQueue, insertAfterCurrent, removeFromQueue, getPlayOrder, getCurrentIndex, restoreQueue, saveQueue };
})();

function extractVideoId(input) {
  if (!input) return null;
  input = input.trim();
  // Try regex for various URL formats
  const m = input.match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // Try raw 11-char ID
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
  return null;
}

async function fetchYouTubeMeta(videoId) {
  const fallback = {
    title: 'YouTube Video (' + videoId + ')',
    author: 'YouTube',
    thumbnail: 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg'
  };
  try {
    const resp = await fetch('https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=' + videoId + '&format=json');
    if (!resp.ok) return fallback;
    const data = await resp.json();
    return {
      title: data.title || fallback.title,
      author: data.author_name || 'YouTube',
      thumbnail: 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg'
    };
  } catch(e) { return fallback; }
}

let ytApiReady = false;
let ytApiPromise = null;
function loadYouTubeAPI() {
  if (ytApiReady) return Promise.resolve();
  if (ytApiPromise) return ytApiPromise;
  ytApiPromise = new Promise(resolve => {
    window.onYouTubeIframeAPIReady = () => { ytApiReady = true; resolve(); };
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  });
  return ytApiPromise;
}


// ============================================================
// SECTION 5: PLAYER ENGINE (dual: audio + YouTube)
// ============================================================
const Player = (() => {
  const audio = document.getElementById('audio');
  let currentTrack = null;
  let currentBlobUrl = null;
  let callbacks = {};
  let activeEngine = 'audio'; // 'audio' or 'youtube'
  let ytPlayer = null;
  let ytReady = false;
  let ytTimeupdateInterval = null;
  let currentVolume = 1;

  // Audio element events
  audio.addEventListener('timeupdate', () => { if (activeEngine === 'audio') fire('timeupdate', audio.currentTime, audio.duration); });
  audio.addEventListener('ended', () => { if (activeEngine === 'audio') fire('ended'); });
  audio.addEventListener('play', () => { if (activeEngine === 'audio') fire('playstate', true); });
  audio.addEventListener('pause', () => { if (activeEngine === 'audio') fire('playstate', false); });
  audio.addEventListener('loadedmetadata', () => { if (activeEngine === 'audio') fire('loaded', audio.duration); });

  function on(event, fn) { if (!callbacks[event]) callbacks[event] = []; callbacks[event].push(fn); }
  function fire(event, ...args) { (callbacks[event] || []).forEach(fn => fn(...args)); }

  // === YouTube player management ===
  function ensureYTPlayer() {
    if (ytPlayer && ytReady) return Promise.resolve();
    if (ytPlayer) return new Promise(r => { const check = setInterval(() => { if (ytReady) { clearInterval(check); r(); } }, 100); });
    return new Promise(resolve => {
      ytPlayer = new YT.Player('yt-player-target', {
        height: '100%', width: '100%',
        playerVars: { controls: 0, disablekb: 1, modestbranding: 1, rel: 0, playsinline: 1 },
        events: {
          onReady: () => { ytReady = true; resolve(); },
          onStateChange: (e) => {
            if (activeEngine !== 'youtube') return;
            if (e.data === YT.PlayerState.PLAYING) fire('playstate', true);
            else if (e.data === YT.PlayerState.PAUSED) fire('playstate', false);
            else if (e.data === YT.PlayerState.ENDED) fire('ended');
          },
          onError: () => {
            if (activeEngine === 'youtube') {
              fire('error', 'YouTube playback error');
              playNext();
            }
          }
        }
      });
    });
  }

  function startYTTimePolling() {
    stopYTTimePolling();
    ytTimeupdateInterval = setInterval(() => {
      if (activeEngine === 'youtube' && ytPlayer && ytReady) {
        const time = ytPlayer.getCurrentTime() || 0;
        const dur = ytPlayer.getDuration() || 0;
        fire('timeupdate', time, dur);
        // Persist duration on first availability
        if (currentTrack && currentTrack.duration === 0 && dur > 0) {
          currentTrack.duration = dur;
          Library.updateTrackInMemory(currentTrack.id, { duration: dur });
          DB.updateTrackMeta({ ...currentTrack });
        }
      }
    }, 250);
  }

  function stopYTTimePolling() {
    if (ytTimeupdateInterval) { clearInterval(ytTimeupdateInterval); ytTimeupdateInterval = null; }
  }

  // === Core track loading ===
  async function loadTrack(track, autoplay) {
    currentTrack = track;

    if (track.source === 'youtube') {
      // Stop audio engine
      audio.pause();
      audio.removeAttribute('src');
      if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }

      activeEngine = 'youtube';
      await loadYouTubeAPI();
      await ensureYTPlayer();
      ytPlayer.setVolume(currentVolume * 100);
      if (autoplay === false) {
        ytPlayer.cueVideoById(track.videoId);
      } else {
        ytPlayer.loadVideoById(track.videoId);
      }
      startYTTimePolling();
    } else {
      // Stop YouTube engine
      stopYTTimePolling();
      if (ytPlayer && ytReady) { try { ytPlayer.stopVideo(); } catch(e) {} }

      activeEngine = 'audio';
      if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
      const blob = await DB.getTrackBlob(track.id);
      if (!blob) { fire('error', 'File not found in storage'); return; }
      currentBlobUrl = URL.createObjectURL(blob);
      audio.src = currentBlobUrl;
      audio.volume = currentVolume;
    }

    fire('trackchange', track);
    updateMediaSession(track);
  }

  // === Delegated controls ===
  function play() {
    if (activeEngine === 'youtube' && ytPlayer && ytReady) { ytPlayer.playVideo(); return Promise.resolve(); }
    return audio.play().catch(() => {});
  }
  function pause() {
    if (activeEngine === 'youtube' && ytPlayer && ytReady) { ytPlayer.pauseVideo(); return; }
    audio.pause();
  }
  function togglePlay() { isPlaying() ? pause() : play(); }
  function seek(time) {
    if (!isFinite(time)) return;
    if (activeEngine === 'youtube' && ytPlayer && ytReady) { ytPlayer.seekTo(time, true); return; }
    audio.currentTime = time;
  }
  function setVolume(v) {
    currentVolume = v;
    audio.volume = v;
    if (ytPlayer && ytReady) ytPlayer.setVolume(v * 100);
  }
  function getVolume() { return currentVolume; }
  function isPlaying() {
    if (activeEngine === 'youtube' && ytPlayer && ytReady) return ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
    return !audio.paused;
  }
  function getCurrentTrack() { return currentTrack; }
  function getCurrentTime() {
    if (activeEngine === 'youtube' && ytPlayer && ytReady) return ytPlayer.getCurrentTime() || 0;
    return audio.currentTime;
  }
  function getDuration() {
    if (activeEngine === 'youtube' && ytPlayer && ytReady) return ytPlayer.getDuration() || 0;
    return audio.duration || 0;
  }
  function getActiveEngine() { return activeEngine; }

  async function playTrack(track) {
    await loadTrack(track, true);
    if (activeEngine === 'audio') await play();
  }

  async function playNext() {
    const id = Queue.next();
    if (id == null) { pause(); return; }
    const track = Library.getAll().find(t => t.id === id);
    if (track) await playTrack(track);
  }

  async function playPrev() {
    if (getCurrentTime() > 3) { seek(0); return; }
    const id = Queue.prev();
    if (id == null) return;
    const track = Library.getAll().find(t => t.id === id);
    if (track) await playTrack(track);
  }

  function updateMediaSession(track) {
    if (!('mediaSession' in navigator)) return;
    let artwork = [];
    if (track.source === 'youtube' && track.thumbnailUrl) {
      artwork = [{ src: track.thumbnailUrl, sizes: '480x360', type: 'image/jpeg' }];
    } else if (track.hasArt) {
      DB.getTrackArt(track.id).then(art => {
        if (art && art.blob) {
          const url = URL.createObjectURL(art.blob);
          navigator.mediaSession.metadata = new MediaMetadata({
            title: track.title, artist: track.artist, album: track.album,
            artwork: [{ src: url, sizes: '300x300', type: art.mime || 'image/jpeg' }]
          });
        }
      });
    }
    navigator.mediaSession.metadata = new MediaMetadata({ title: track.title, artist: track.artist, album: track.album || '', artwork });
    navigator.mediaSession.setActionHandler('play', () => play());
    navigator.mediaSession.setActionHandler('pause', () => pause());
    navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
    navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
    navigator.mediaSession.setActionHandler('seekto', (d) => seek(d.seekTime));
  }

  // Auto-play next on end
  on('ended', () => {
    const state = Queue.getState();
    if (state.repeatMode === 'one') { seek(0); play(); }
    else playNext();
  });

  // Save position periodically
  let saveInterval = null;
  function startSaving() {
    if (saveInterval) return;
    saveInterval = setInterval(() => {
      if (currentTrack) {
        DB.saveState('position', { trackId: currentTrack.id, time: getCurrentTime(), volume: currentVolume });
      }
    }, 5000);
  }
  startSaving();

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && currentTrack) {
      DB.saveState('position', { trackId: currentTrack.id, time: getCurrentTime(), volume: currentVolume });
    }
  });

  return { on, loadTrack, play, pause, togglePlay, seek, setVolume, getVolume, isPlaying, getCurrentTrack, getCurrentTime, getDuration, getActiveEngine, playTrack, playNext, playPrev };
})();

let currentThemeId = 'dark';
let currentBgUrl = '';

function applyTheme(themeId) {
  const theme = THEMES[themeId];
  if (!theme) return;
  currentThemeId = themeId;
  const s = document.documentElement.style;
  s.setProperty('--bg', theme.bg);
  s.setProperty('--surface', theme.surface);
  s.setProperty('--surface2', theme.surface2);
  s.setProperty('--surface3', theme.surface3);
  s.setProperty('--accent', theme.accent);
  s.setProperty('--accent-dim', theme.accentDim);
  s.setProperty('--text', theme.text);
  s.setProperty('--text2', theme.text2);
  s.setProperty('--text3', theme.text3);
  s.setProperty('--divider', theme.divider);
  s.setProperty('--danger', theme.danger);
  s.setProperty('--play-btn-fg', theme.playBtnFg || '#ffffff');
  // Update translucent bg for background image overlay
  s.setProperty('--bg-translucent', hexToRgba(theme.bg, 0.88));
  // Update meta theme-color
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme.bg);
  document.documentElement.dataset.theme = themeId;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function applyBackground(url) {
  const bgLayer = document.getElementById('bg-layer');
  if (url) {
    // Preload to detect errors
    const img = new Image();
    img.onload = () => {
      currentBgUrl = url;
      bgLayer.style.backgroundImage = 'url("' + url.replace(/"/g, '\\"') + '")';
      bgLayer.classList.add('has-image');
      document.documentElement.classList.add('has-bg-image');
      DB.savePref('bgImage', url);
      if (typeof UI !== 'undefined' && UI.updateBgPreview) UI.updateBgPreview();
    };
    img.onerror = () => {
      bgLayer.style.backgroundImage = 'none';
      bgLayer.classList.remove('has-image');
      document.documentElement.classList.remove('has-bg-image');
      currentBgUrl = '';
      DB.savePref('bgImage', '');
      if (typeof UI !== 'undefined' && UI.showToast) UI.showToast('Could not load image');
      if (typeof UI !== 'undefined' && UI.updateBgPreview) UI.updateBgPreview();
    };
    img.src = url;
  } else {
    currentBgUrl = '';
    bgLayer.style.backgroundImage = 'none';
    bgLayer.classList.remove('has-image');
    document.documentElement.classList.remove('has-bg-image');
    DB.savePref('bgImage', '');
  }
}
