      showLibrary();
    }
    // Reset inputs
    folderInput.value = '';
    fileInput.value = '';
  }

  function handleClearLibrary() {
    if (confirm('Remove all tracks from your library?')) {
      Player.pause();
      Library.clearLibrary();
      Playlist.clearAll();
      currentPlaylistId = null;
      artCache.forEach(url => URL.revokeObjectURL(url));
      artCache.clear();
      miniPlayer.classList.add('hidden');
      hideNowPlaying();
      showWelcome();
    }
  }

  function handleShuffle() {
    Queue.toggleShuffle();
    updateShuffleRepeatUI();
    renderQueue();
  }

  function handleRepeat() {
    Queue.cycleRepeat();
    updateShuffleRepeatUI();
  }

  function updateShuffleRepeatUI() {
    const state = Queue.getState();
    const shuffleBtn = $('ctrl-shuffle');
    const repeatBtn = $('ctrl-repeat');
    shuffleBtn.classList.toggle('ctrl-active', state.shuffleOn);
    repeatBtn.classList.toggle('ctrl-active', state.repeatMode !== 'off');

    // Update repeat icon
    if (state.repeatMode === 'one') {
      repeatBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="12" y="15" text-anchor="middle" font-size="8" fill="currentColor" stroke="none" font-weight="bold">1</text></svg>';
    } else {
      repeatBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>';
    }
  }

  function updatePlayButtons(playing) {
    const icon = playing
      ? '<svg width="32" height="32" viewBox="0 0 24 24" fill="var(--play-btn-fg, #fff)"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
      : '<svg width="32" height="32" viewBox="0 0 24 24" fill="var(--play-btn-fg, #fff)"><path d="M8 5v14l11-7z"/></svg>';
    $('ctrl-play').innerHTML = icon;

    const miniIcon = playing
      ? '<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
      : '<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    $('mini-play').innerHTML = miniIcon;
  }

  async function updateNowPlaying(track) {
    $('np-title').textContent = track.title;
    $('np-artist').textContent = track.artist;

    const artEl = $('np-art');
    const ytContainer = $('np-yt-container');
    const videoToggle = $('np-video-toggle');

    // Reset state
    ytContainer.classList.remove('yt-offscreen');
    ytContainer.classList.add('hidden');
    artEl.classList.remove('hidden');
    artEl.style.position = '';

    if (track.source === 'youtube') {
      videoToggle.classList.remove('hidden');
      if (videoVisible) {
        ytContainer.classList.remove('hidden');
        artEl.classList.add('hidden');
      } else {
        ytContainer.classList.remove('hidden');
        ytContainer.classList.add('yt-offscreen');
        artEl.style.position = 'relative';
        artEl.innerHTML = track.thumbnailUrl
          ? `<img src="${escHTML(track.thumbnailUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;opacity:0.7"><div class="yt-badge">YouTube</div>`
          : '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="color:var(--text3)"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
      }
    } else {
      videoToggle.classList.add('hidden');
      if (track.hasArt) {
        const art = await DB.getTrackArt(track.id);
        if (art && art.blob) {
          const url = URL.createObjectURL(art.blob);
          artEl.innerHTML = `<img src="${url}" alt="Album art">`;
          artCache.set(track.id, url);
        }
      } else {
        artEl.innerHTML = '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3)"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
      }
    }
  }

  async function updateMiniPlayer(track) {
    miniPlayer.classList.remove('hidden');
    $('mini-title').textContent = track.title;
    $('mini-artist').textContent = track.artist;

    const artEl = $('mini-art');
    if (track.source === 'youtube' && track.thumbnailUrl) {
      artEl.innerHTML = `<img src="${escHTML(track.thumbnailUrl)}" alt="">`;
    } else if (track.hasArt) {
      if (artCache.has(track.id)) {
        artEl.innerHTML = `<img src="${artCache.get(track.id)}" alt="">`;
      } else {
        const art = await DB.getTrackArt(track.id);
        if (art && art.blob) {
          const url = URL.createObjectURL(art.blob);
          artCache.set(track.id, url);
          artEl.innerHTML = `<img src="${url}" alt="">`;
        }
      }
    } else {
      artEl.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3)"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
    }
  }

  // === VIEW MANAGEMENT ===
  function showWelcome() {
    welcomeView.classList.remove('hidden');
    libraryView.classList.add('hidden');
  }

  function showLibrary() {
    welcomeView.classList.add('hidden');
    libraryView.classList.remove('hidden');
    renderLibrary();
  }

  function showNowPlaying() {
    npView.classList.add('visible');
  }

  function hideNowPlaying() {
    npView.classList.remove('visible');
  }

  function showQueue() {
    queuePanel.classList.add('visible');
    renderQueue();
  }

  function hideQueue() {
    queuePanel.classList.remove('visible');
  }

  function showSettings() {
    settingsPanel.classList.add('visible');
    renderThemeSwatches();
    updateBgPreview();
    $('bg-url-input').value = currentBgUrl;
  }

  function hideSettings() {
    settingsPanel.classList.remove('visible');
  }

  function renderThemeSwatches() {
    const grid = $('theme-grid');
    grid.innerHTML = Object.entries(THEMES).map(([id, t]) =>
      `<div class="theme-swatch${id === currentThemeId ? ' active' : ''}" data-theme="${id}">
        <div class="swatch-preview" style="background:${t.bg}">
          <div class="swatch-dot" style="background:${t.accent}"></div>
        </div>
        <span class="swatch-name">${t.name}</span>
      </div>`
    ).join('');
    grid.querySelectorAll('.theme-swatch').forEach(el => {
      el.onclick = () => {
        const id = el.dataset.theme;
        applyTheme(id);
        DB.savePref('theme', id);
        renderThemeSwatches();
        showToast(`Theme: ${THEMES[id].name}`);
      };
    });
  }

  function handleBgApply() {
    const url = $('bg-url-input').value.trim();
    if (!url) return;
    applyBackground(url);
    // DB save and preview update happen in applyBackground callbacks
  }

  function updateBgPreview() {
    const row = $('bg-preview-row');
    if (currentBgUrl) {
      const thumb = document.createElement('img');
      thumb.className = 'bg-preview-thumb';
      thumb.src = currentBgUrl;
      thumb.alt = 'Background preview';
      thumb.onerror = () => { thumb.style.display = 'none'; };
      const clearBtn = document.createElement('button');
      clearBtn.className = 'bg-clear-btn';
      clearBtn.id = 'bg-clear-action';
      clearBtn.textContent = 'Clear Background';
      row.innerHTML = '';
      row.appendChild(thumb);
      row.appendChild(clearBtn);
      clearBtn.onclick = () => {
        applyBackground('');
        $('bg-url-input').value = '';
        updateBgPreview();
        showToast('Background removed');
      };
    } else {
      row.innerHTML = '<span class="bg-no-image">No background image</span>';
    }
  }

  function showImportOverlay() {
    importOverlay.classList.remove('hidden');
    $('import-bar').style.width = '0%';
    $('import-text').textContent = 'Importing music...';
    $('import-detail').textContent = '';
  }

  function hideImportOverlay() {
    importOverlay.classList.add('hidden');
  }

  function showAddMenu() {
    const items = [];
    if (supportsFolderPick) items.push({ label: 'Select Folder', icon: 'folder', action: () => folderInput.click() });
    items.push({ label: 'Add Files', icon: 'file', action: () => fileInput.click() });
    items.push({ label: 'Add YouTube Link', icon: 'youtube', action: () => showYouTubeDialog() });
    showContextMenuRaw('Add Music', '', items);
  }

  async function showYouTubeDialog() {
    const url = await showPrompt('Add YouTube Video', 'Paste YouTube URL...', '');
    if (!url) return;
    const videoId = extractVideoId(url);
    if (!videoId) { showToast('Invalid YouTube URL'); return; }
    if (Library.isYouTubeDuplicate(videoId)) { showToast('Already in library'); return; }

    showToast('Fetching video info...');
    const meta = await fetchYouTubeMeta(videoId);
    const trackData = {
      title: meta.title, artist: meta.author, album: 'YouTube',
      year: '', duration: 0, fileName: '', fileSize: 0, hasArt: false,
      source: 'youtube', videoId: videoId, thumbnailUrl: meta.thumbnail
    };
    const id = await DB.addTrackMeta(trackData);
    Library.addToMemory({ ...trackData, id });
    showToast(`Added: ${meta.title}`);
    if (Library.getAll().length === 1) showLibrary();
  }

  function toggleVideoVisibility() {
    videoVisible = !videoVisible;
    DB.savePref('ytVideoVisible', videoVisible);
    const track = Player.getCurrentTrack();
    if (track) updateNowPlaying(track);
    // Update toggle icon
    $('np-video-toggle').innerHTML = videoVisible
      ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
      : '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  }

  // === LIBRARY RENDERING ===
  function renderLibrary() {
    const query = searchInput.value.trim();
    const tracks = query ? Library.search(query) : Library.getAll();
    const currentTrack = Player.getCurrentTrack();
    const total = Library.getAll().length;
    $('lib-count').textContent = total > 0 ? `(${total})` : '';

    if (currentTab !== 'playlists') {
      if (tracks.length === 0 && !query) {
        libContent.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>No tracks yet</p></div>';
        return;
      }
      if (tracks.length === 0 && query) {
        libContent.innerHTML = '<div class="empty-state"><p>No results found</p></div>';
        return;
      }
    }

    let html = '';

    if (currentTab === 'songs') {
      html = tracks.map(t => trackItemHTML(t, currentTrack)).join('');
    } else if (currentTab === 'artists') {
      const groups = query
        ? [['Results', tracks]]
        : Library.getByArtist();
      groups.forEach(([artist, artistTracks]) => {
        html += `<div class="group-header">${escHTML(artist)} <span style="color:var(--text3);font-size:14px;font-weight:400">${artistTracks.length}</span></div>`;
        html += artistTracks.map(t => trackItemHTML(t, currentTrack)).join('');
      });
    } else if (currentTab === 'albums') {
      const groups = query
        ? [{ album: 'Results', artist: '', tracks }]
        : Library.getByAlbum();
      groups.forEach(g => {
        html += `<div class="group-header">${escHTML(g.album)}</div>`;
        if (g.artist) html += `<div class="group-subheader">${escHTML(g.artist)}</div>`;
        html += g.tracks.map(t => trackItemHTML(t, currentTrack)).join('');
      });
    } else if (currentTab === 'playlists') {
      if (currentPlaylistId) {
        // Playlist detail view
        const pl = Playlist.getById(currentPlaylistId);
        if (!pl) { currentPlaylistId = null; renderLibrary(); return; }
        const plTracks = Playlist.getTracksForPlaylist(currentPlaylistId);
        html += `<div class="pl-detail-header">
          <button class="pl-back" data-action="pl-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div class="pl-detail-name">${escHTML(pl.name)}</div>
          <div class="pl-detail-actions">
            ${plTracks.length ? `<button class="pl-shuffle-btn" data-action="pl-shuffle">Shuffle</button>
            <button class="pl-play-btn" data-action="pl-play">Play All</button>` : ''}
          </div>
        </div>`;
        if (plTracks.length === 0) {
          html += '<div class="empty-state"><p>No tracks in this playlist.<br>Add tracks from the library using the track menu.</p></div>';
        } else {
          html += plTracks.map(t => trackItemHTML(t, currentTrack)).join('');
        }
      } else {
        // Playlist list view
        const allPl = Playlist.getAll();
        const filtered = query ? allPl.filter(p => p.name.toLowerCase().includes(query.toLowerCase())) : allPl;
        html += `<button class="create-playlist-btn" data-action="create-pl">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Create Playlist
        </button>`;
        if (filtered.length === 0 && query) {
          html += '<div class="empty-state"><p>No playlists match your search</p></div>';
        } else {
          filtered.forEach(pl => {
            const count = pl.trackIds.length;
            html += `<div class="playlist-item" data-plid="${pl.id}">
              <div class="playlist-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text3)"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
              <div class="playlist-info">
                <div class="playlist-name">${escHTML(pl.name)}</div>
                <div class="playlist-count">${count} track${count !== 1 ? 's' : ''}</div>
              </div>
              <button class="track-menu-btn" data-plmenu="${pl.id}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
              </button>
            </div>`;
          });
        }
      }
    }

    libContent.innerHTML = html;

    // Bind track click events
    libContent.querySelectorAll('.track-item').forEach(el => {
      const id = parseInt(el.dataset.id);
      el.onclick = (e) => {
        if (e.target.closest('.track-menu-btn')) return;
        playFromLibrary(id);
      };
      const menuBtn = el.querySelector('.track-menu-btn');
      if (menuBtn) {
        menuBtn.onclick = (e) => {
          e.stopPropagation();
          if (currentTab === 'playlists' && currentPlaylistId) {
            showPlaylistTrackMenu(id, currentPlaylistId);
          } else {
            showTrackMenu(id);
          }
        };
      }
    });

    // Bind playlist-specific events
    libContent.querySelectorAll('[data-action="create-pl"]').forEach(el => {
      el.onclick = async () => {
        const name = await showPrompt('New Playlist', 'Playlist name', '');
        if (name) { await Playlist.create(name); renderLibrary(); }
      };
    });
    libContent.querySelectorAll('.playlist-item').forEach(el => {
      el.onclick = (e) => {
        if (e.target.closest('[data-plmenu]')) return;
        currentPlaylistId = parseInt(el.dataset.plid);
        renderLibrary();
      };
    });
    libContent.querySelectorAll('[data-plmenu]').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); showPlaylistMenu(parseInt(btn.dataset.plmenu)); };
    });
    libContent.querySelectorAll('[data-action="pl-back"]').forEach(el => {
      el.onclick = () => { currentPlaylistId = null; renderLibrary(); };
    });
    libContent.querySelectorAll('[data-action="pl-play"]').forEach(el => {
      el.onclick = () => {
        const tracks = Playlist.getTracksForPlaylist(currentPlaylistId);
        if (tracks.length) { Queue.setQueue(tracks.map(t => t.id), tracks[0].id); Player.playTrack(tracks[0]); }
      };
    });
    libContent.querySelectorAll('[data-action="pl-shuffle"]').forEach(el => {
      el.onclick = () => {
        const tracks = Playlist.getTracksForPlaylist(currentPlaylistId);
        if (tracks.length) {
          const ids = tracks.map(t => t.id);
          if (!Queue.getState().shuffleOn) Queue.toggleShuffle();
          Queue.setQueue(ids, ids[0]);
          Player.playTrack(tracks[0]);
        }
      };
    });

    // Load art for visible tracks
    loadVisibleArt();
  }

  function trackItemHTML(t, currentTrack) {
    const isPlaying = currentTrack && currentTrack.id === t.id;
    const isYT = t.source === 'youtube';
    let artHtml;
    if (isYT && t.thumbnailUrl) {
      artHtml = `<img src="${escHTML(t.thumbnailUrl)}" alt=""><span class="yt-badge-sm">YT</span>`;
    } else if (t.hasArt && artCache.has(t.id)) {
      artHtml = `<img src="${artCache.get(t.id)}" alt="">`;
    } else {
      artHtml = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text3)"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
    }
    const dur = (isYT && !t.duration) ? '--:--' : formatTime(t.duration);
    return `<div class="track-item${isPlaying ? ' playing' : ''}" data-id="${t.id}">
      <div class="track-art-sm" data-art-id="${t.id}">${artHtml}</div>
      <div class="track-info">
        <div class="track-title">${escHTML(t.title)}</div>
        <div class="track-artist">${escHTML(t.artist)}</div>
      </div>
      <span class="track-duration">${dur}</span>
      <button class="track-menu-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
      </button>
    </div>`;
  }

  async function loadVisibleArt() {
    const artEls = libContent.querySelectorAll('.track-art-sm[data-art-id]');
    for (const el of artEls) {
      const id = parseInt(el.dataset.artId);
      // Skip YouTube tracks — their thumbnails are loaded via URL in trackItemHTML
      const track = Library.getAll().find(t => t.id === id);
      if (track && track.source === 'youtube') continue;
      if (artCache.has(id) && !el.querySelector('img')) {
        el.innerHTML = `<img src="${artCache.get(id)}" alt="">`;
        continue;
      }
      if (!artCache.has(id)) {
        if (track && track.hasArt) {
          const art = await DB.getTrackArt(id);
          if (art && art.blob) {
            const url = URL.createObjectURL(art.blob);
            artCache.set(id, url);
            // Re-check element is still in DOM
            const freshEl = libContent.querySelector(`.track-art-sm[data-art-id="${id}"]`);
            if (freshEl) freshEl.innerHTML = `<img src="${url}" alt="">`;
          }
        }
      }
    }
  }

  function playFromLibrary(trackId) {
    const query = searchInput.value.trim();
    let trackList;
    if (query) {
      trackList = Library.search(query);
    } else if (currentTab === 'artists') {
      const track = Library.getAll().find(t => t.id === trackId);
      if (track) {
        const groups = Library.getByArtist();
        const group = groups.find(([artist]) => artist === track.artist);
        trackList = group ? group[1] : [track];
      } else {
        trackList = Library.getAll();
      }
    } else if (currentTab === 'albums') {
      const track = Library.getAll().find(t => t.id === trackId);
      if (track) {
        const groups = Library.getByAlbum();
        const group = groups.find(g => g.album === track.album && g.artist === track.artist);
        trackList = group ? group.tracks : [track];
      } else {
        trackList = Library.getAll();
      }
    } else if (currentTab === 'playlists' && currentPlaylistId) {
      trackList = Playlist.getTracksForPlaylist(currentPlaylistId);
    } else {
      trackList = Library.getAll();
    }
    const ids = trackList.map(t => t.id);
    Queue.setQueue(ids, trackId);
    const track = Library.getAll().find(t => t.id === trackId);
    if (track) Player.playTrack(track);
  }

  // === QUEUE RENDERING ===
  function renderQueue() {
    const order = Queue.getPlayOrder();
    const idx = Queue.getCurrentIndex();
    const allTracks = Library.getAll();

    if (order.length === 0) {
      $('queue-list').innerHTML = '<div class="empty-state"><p>Queue is empty</p></div>';
      return;
    }

    let html = '';
    order.forEach((id, i) => {
      const t = allTracks.find(tr => tr.id === id);
      if (!t) return;
      html += `<div class="queue-item${i === idx ? ' current' : ''}" data-index="${i}">
        <div class="q-drag"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg></div>
        <div class="q-info">
          <div class="q-title">${escHTML(t.title)}</div>
          <div class="q-artist">${escHTML(t.artist)}</div>
        </div>
        <button class="q-remove" data-index="${i}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    });

    $('queue-list').innerHTML = html;

    // Bind remove buttons
    $('queue-list').querySelectorAll('.q-remove').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const i = parseInt(btn.dataset.index);
        Queue.removeFromQueue(i);
        renderQueue();
      };
    });

    // Bind tap to play
    $('queue-list').querySelectorAll('.queue-item').forEach(el => {
      el.onclick = (e) => {
        if (e.target.closest('.q-remove') || e.target.closest('.q-drag')) return;
        const i = parseInt(el.dataset.index);
        const trackId = Queue.jumpTo(i);
        if (trackId != null) {
          const track = Library.getAll().find(t => t.id === trackId);
          if (track) Player.playTrack(track);
        }
        renderQueue();
      };
    });
  }

  // === CONTEXT MENU ===
  function showTrackMenu(trackId) {
    const track = Library.getAll().find(t => t.id === trackId);
    if (!track) return;

    const items = [
      { label: 'Play Next', icon: 'next', action: () => { Queue.insertAfterCurrent(trackId); showToast('Playing next'); } },
      { label: 'Add to Queue', icon: 'queue', action: () => { Queue.addToQueue(trackId); showToast('Added to queue'); } },
      { label: 'Add to Playlist...', icon: 'playlist', action: () => showAddToPlaylistMenu(trackId) },
    ];
    if (track.source === 'youtube' && track.videoId) {
      items.push({ label: 'Copy YouTube Link', icon: 'link', action: () => {
        navigator.clipboard.writeText('https://www.youtube.com/watch?v=' + track.videoId).then(() => showToast('Link copied')).catch(() => showToast('Copy failed'));
      }});
    }
    items.push({ label: 'Remove from Library', icon: 'trash', danger: true, action: () => {
      Library.removeTrack(trackId);
      Playlist.removeTrackFromAll(trackId);
      showToast('Track removed');
    }});

    showContextMenuRaw(track.title, track.artist, items);
  }

  function showPlaylistTrackMenu(trackId, playlistId) {
    const track = Library.getAll().find(t => t.id === trackId);
    if (!track) return;
    const items = [
      { label: 'Play Next', icon: 'next', action: () => { Queue.insertAfterCurrent(trackId); showToast('Playing next'); } },
      { label: 'Add to Queue', icon: 'queue', action: () => { Queue.addToQueue(trackId); showToast('Added to queue'); } },
      { label: 'Add to Playlist...', icon: 'playlist', action: () => showAddToPlaylistMenu(trackId) },
      { label: 'Remove from Playlist', icon: 'trash', danger: true, action: () => {
        Playlist.removeTrack(playlistId, trackId);
        renderLibrary();
        showToast('Removed from playlist');
      }},
    ];
    showContextMenuRaw(track.title, track.artist, items);
  }

  function showAddToPlaylistMenu(trackId) {
    const allPl = Playlist.getAll();
    const items = [
      { label: 'New Playlist...', icon: 'folder', action: async () => {
        const name = await showPrompt('New Playlist', 'Playlist name', '');
        if (name) {
          const pl = await Playlist.create(name);
          await Playlist.addTrack(pl.id, trackId);
          showToast(`Added to "${name}"`);
        }
      }},
      ...allPl.map(pl => ({
        label: pl.name, icon: 'playlist', action: async () => {
          const added = await Playlist.addTrack(pl.id, trackId);
          showToast(added ? `Added to "${pl.name}"` : `Already in "${pl.name}"`);
        }
      }))
    ];
    showContextMenuRaw('Add to Playlist', '', items);
  }

  function showPlaylistMenu(playlistId) {
    const pl = Playlist.getById(playlistId);
    if (!pl) return;
    const tracks = Playlist.getTracksForPlaylist(playlistId);
    const items = [
      { label: 'Play All', icon: 'next', action: () => {
        if (tracks.length) { Queue.setQueue(tracks.map(t => t.id), tracks[0].id); Player.playTrack(tracks[0]); }
      }},
      { label: 'Shuffle Play', icon: 'queue', action: () => {
        if (tracks.length) {
          const ids = tracks.map(t => t.id);
          if (!Queue.getState().shuffleOn) Queue.toggleShuffle();
          Queue.setQueue(ids, ids[0]);
          Player.playTrack(tracks[0]);
        }
      }},
      { label: 'Rename', icon: 'file', action: async () => {
        const name = await showPrompt('Rename Playlist', 'Playlist name', pl.name);
        if (name && name !== pl.name) { await Playlist.rename(playlistId, name); renderLibrary(); showToast('Playlist renamed'); }
      }},
      { label: 'Delete Playlist', icon: 'trash', danger: true, action: () => {
        if (confirm(`Delete "${pl.name}"?`)) { Playlist.remove(playlistId); renderLibrary(); showToast('Playlist deleted'); }
      }},
    ];
    showContextMenuRaw(pl.name, `${pl.trackIds.length} tracks`, items);
  }

  function showContextMenuRaw(title, subtitle, items) {
    $('ctx-title').textContent = title;
    $('ctx-subtitle').textContent = subtitle;

    const icons = {
      folder: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
      file: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
      next: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 12 12 5 19 12"/><line x1="12" y1="5" x2="12" y2="19"/></svg>',
      queue: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
      trash: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
      playlist: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
      youtube: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.13C5.12 19.56 12 19.56 12 19.56s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.43z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg>',
      link: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
    };

    $('ctx-items').innerHTML = items.map(item =>
      `<div class="ctx-item${item.danger ? ' danger' : ''}">${icons[item.icon] || ''}${escHTML(item.label)}</div>`
    ).join('');

    $('ctx-items').querySelectorAll('.ctx-item').forEach((el, i) => {
      el.onclick = () => { hideContextMenu(); items[i].action(); };
    });

    contextBackdrop.classList.remove('hidden');
    contextMenu.classList.add('visible');
  }

  function hideContextMenu() {
    contextBackdrop.classList.add('hidden');
    contextMenu.classList.remove('visible');
  }

  // === TOAST ===
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('visible'), 2500);
  }

  // === HELPERS ===
  function formatTime(sec) {
    if (!sec || !isFinite(sec)) return '0:00';
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = Math.floor(sec % 60);
    if (h > 0) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function showPrompt(title, placeholder, defaultValue) {
    return new Promise(resolve => {
      let resolved = false;
      const backdrop = $('prompt-backdrop');
      const dialog = $('prompt-dialog');
      const input = $('prompt-input');
      $('prompt-title').textContent = title;
      input.placeholder = placeholder || '';
      input.value = defaultValue || '';
      backdrop.classList.remove('hidden');
      dialog.classList.remove('hidden');
      setTimeout(() => input.focus(), 50);
      const done = (val) => {
        if (resolved) return;
        resolved = true;
        backdrop.classList.add('hidden');
        dialog.classList.add('hidden');
        $('prompt-cancel').onclick = null;
        $('prompt-confirm').onclick = null;
        input.onkeydown = null;
        backdrop.onclick = null;
        resolve(val);
      };
      $('prompt-cancel').onclick = () => done(null);
      $('prompt-confirm').onclick = () => done(input.value.trim() || null);
      input.onkeydown = (e) => { if (e.key === 'Enter') done(input.value.trim() || null); };
      backdrop.onclick = () => done(null);
    });
  }

  function escHTML(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function setVideoVisible(v) { videoVisible = v; }

  return { init, showWelcome, showLibrary, showNowPlaying, hideNowPlaying, showToast, formatTime, updateBgPreview, setVideoVisible };
})();


// ============================================================
// SECTION 8: APP INITIALIZATION
// ============================================================
(async function App() {
  try {
    await DB.open();

    // Restore theme and background before UI renders
    const savedTheme = await DB.getPref('theme');
    if (savedTheme && THEMES[savedTheme]) applyTheme(savedTheme);
    else applyTheme('dark');
    const savedBg = await DB.getPref('bgImage');
    if (savedBg) applyBackground(savedBg);

    await Library.loadFromDB();
    await Playlist.loadFromDB();
    await Queue.restoreQueue();

    // Restore video visibility preference
    const savedVideoVis = await DB.getPref('ytVideoVisible');

    UI.init();

    if (savedVideoVis === false) UI.setVideoVisible(false);

    const tracks = Library.getAll();
    if (tracks.length > 0) {
      UI.showLibrary();

      // Restore playback state
      try {
        const pos = await DB.getState('position');
        const vol = await DB.getPref('volume');
        if (vol != null) {
          Player.setVolume(vol);
          const vb = document.getElementById('vol-bar');
          vb.value = vol * 100;
          vb.style.background = `linear-gradient(to right, var(--text2) ${vb.value}%, var(--surface2) ${vb.value}%)`;
        }
        if (pos && pos.trackId) {
          const track = tracks.find(t => t.id === pos.trackId);
          if (track) {
            // For YouTube tracks, don't auto-load on startup (requires user interaction)
            if (track.source !== 'youtube') {
              await Player.loadTrack(track, false);
              Player.seek(pos.time || 0);
            }
          }
        }
      } catch(e) {}
    } else {
      UI.showWelcome();
    }
  } catch(e) {
    console.error('App init failed:', e);
    document.body.innerHTML = `<div style="padding:32px;text-align:center;color:#fff">
      <h2>Failed to initialize</h2>
      <p style="color:#b3b3b3;margin-top:12px">${e.message}</p>
      <p style="color:#777;margin-top:8px">IndexedDB may not be available on this browser/context.</p>
    </div>`;
  }
})();
</script>
